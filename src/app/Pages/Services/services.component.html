<section id="services" class="services-modern">
  <div class="container">
    <div class="section-heading">
      <span class="eyebrow">Servicios legales</span>
      <h2>Áreas diseñadas para proteger decisiones importantes</h2>
      <p>Elige el frente legal que necesitas y agenda una asesoría con un equipo que explica riesgos, escenarios y próximos pasos.</p>
    </div>

    <div class="services-grid">
      <article class="service-card" *ngFor="let servicio of servicios">
        <div class="service-icon">
          <i class="bi {{ servicio.icono }}" aria-hidden="true"></i>
        </div>
        <span>{{ servicio.etiqueta }}</span>
        <h3>{{ servicio.nombre }}</h3>
        <p>{{ servicio.resumen }}</p>
        <button class="btn btn-outline-dark" type="button" (click)="requestAdvice(servicio.nombre)">
          Solicitar asesoría
        </button>
      </article>
    </div>
  </div>
</section>
